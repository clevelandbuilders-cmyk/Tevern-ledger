// ── DB MODAL ──────────────────────────────────────────────────────────────────
function Modal({title,items,fkey,onAdd,onClose,Card}){
const[q,setQ]=useState(””);
const[cat,setCat]=useState(“All”);
const[open,setOpen]=useState(null);
const cats=[“All”,…new Set(items.map(i=>i[fkey]||””).filter(Boolean))].sort((a,b)=>a===“All”?-1:b===“All”?1:a.localeCompare(b));
const list=items.filter(it=>{
const h=(it.name+” “+(it.desc||””)+” “+(it[fkey]||””)+” “+((it.classes||[]).join(” “))).toLowerCase();
return h.includes(q.toLowerCase())&&(cat===“All”||(it[fkey]||””)===cat);
});
return(
<div style={T.modal} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
<div style={T.mbox}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:10}}>
<span style={{fontFamily:”‘Cinzel Decorative’,serif”,fontSize:”.9rem”,color:goldb}}>{title}</span>
<button onClick={onClose} style={{background:“transparent”,border:“none”,fontSize:“1.3rem”,color:goldd,cursor:“pointer”}}>×</button>
</div>
<input style={T.srch} placeholder=“Search…” value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
<div style={{display:“flex”,gap:3,flexWrap:“wrap”,marginBottom:8}}>
{cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{…T.bts(c===cat?“p”:””),fontSize:”.44rem”,padding:“2px 7px”}}>{c}</button>)}
</div>
<div style={{fontSize:”.72rem”,color:ink2,fontStyle:“italic”,marginBottom:6}}>{list.length} results — click to expand · ＋ to add</div>
{list.slice(0,80).map((item,i)=>(
<div key={i} style={{…T.card,borderColor:open===i?”#8b6520”:“rgba(139,101,32,.25)”}} onClick={()=>setOpen(open===i?null:i)}>
<Card item={item} expanded={open===i} onAdd={()=>{onAdd(item);onClose();}}/>
</div>
))}
{!list.length&&<div style={{textAlign:“center”,color:goldd,fontStyle:“italic”,padding:20}}>No results found.</div>}
</div>
</div>
);
}

                const init=m.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
                return(<div key={i} onClick={()=>setRecs(sel?recs.filter(x=>x!==i):[...recs,i])} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 10px",background:sel?(m.isDM?"rgba(122,28,28,.12)":"rgba(26,47,90,.1)"):"rgba(139,101,32,.07)",border:`1.5px solid ${sel?(m.isDM?red:blue):"rgba(139,101,32,.3)"}`,borderRadius:2,cursor:"pointer",userSelect:"none",transition:"all .2s"}}>
                  <div style={{width:30,height:30,borderRadius:"50%",border:"1.5px solid #8b6520",background:"rgba(245,230,200,.8)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Cinzel',serif",fontSize:".7rem",fontWeight:700,color:goldd,flexShrink:0}}>{init}</div>
                  <div style={{flex:1}}><div style={{fontFamily:"'Cinzel',serif",fontSize:".7rem",fontWeight:600,color:ink}}>{m.name}</div><div style={{fontFamily:"'Crimson Text',serif",fontSize:".78rem",color:ink2,fontStyle:"italic"}}>{m.isDM?"Dungeon Master":m.role}</div></div>
                  <div style={{width:14,height:14,borderRadius:"50%",border:"1.5px solid #8b6520",background:sel?(m.isDM?red:blue):"transparent",transition:"all .15s",flexShrink:0}}/>
                </div>);
              })}
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
              {["Need healing!","Trap ahead!","Flanking — adv!","Using reaction","Cover me!","Low on spells","Ready action","Retreat!"].map(q=>(
                <button key={q} style={{padding:"3px 8px",border:"1px solid rgba(139,101,32,.35)",borderRadius:10,background:"transparent",fontFamily:"'Cinzel',serif",fontSize:".46rem",letterSpacing:".05em",textTransform:"uppercase",color:goldd,cursor:"pointer"}} onClick={()=>setMsgIn(q)}>{q}</button>
              ))}
            </div>
            <D l="Messages"/>
            <div style={{maxHeight:160,overflowY:"auto",display:"flex",flexDirection:"column",gap:4,marginBottom:8}}>
              {!(c.msgs||[]).length&&<div style={{color:goldd,fontStyle:"italic",fontSize:".85rem",padding:"6px 0"}}>No messages yet…</div>}
              {(c.msgs||[]).map((m,i)=>(
                <div key={i} style={{padding:"7px 10px",borderRadius:2,background:m.isDM?"rgba(122,28,28,.08)":"rgba(26,47,90,.08)",border:`1px solid ${m.isDM?"rgba(122,28,28,.3)":"rgba(26,47,90,.25)"}`,alignSelf:"flex-end",maxWidth:"90%"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:".44rem",color:m.isDM?red:blue,marginBottom:2}}>To: {m.to}</div>
                  <div style={{fontSize:".87rem"}}>{m.text}</div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:".44rem",color:goldd,textAlign:"right",marginTop:2}}>{m.time}</div>
                </div>
              ))}
            </div>
            <textarea style={{...T.ta,minHeight:65}} value={msgIn} onChange={e=>setMsgIn(e.target.value)} placeholder="Type message… (Ctrl+Enter to send)" onKeyDown={e=>{if(e.ctrlKey&&e.key==="Enter"){if(!recs.length){showToast("Select a recipient");return;}if(!msgIn.trim()){showToast("Type a message first");return;}const tn=recs.map(i=>(c.party||[])[i]?.name||"").join(", ");const isDM=recs.some(i=>(c.party||[])[i]?.isDM);upd("msgs",[...(c.msgs||[]),{text:msgIn.trim(),to:tn,isDM,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]);setMsgIn("");showToast("Sent!");}}}/>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:6,alignItems:"center"}}>
              <span style={{fontSize:".72rem",color:ink2,fontStyle:"italic"}}>Ctrl+Enter to send</span>
              <button style={T.btn("b")} onClick={()=>{if(!recs.length){showToast("Select a recipient");return;}if(!msgIn.trim()){showToast("Type a message first");return;}const tn=recs.map(i=>(c.party||[])[i]?.name||"").join(", ");const isDM=recs.some(i=>(c.party||[])[i]?.isDM);upd("msgs",[...(c.msgs||[]),{text:msgIn.trim(),to:tn,isDM,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]);setMsgIn("");showToast("Sent!");}}>Send ➤</button>
            </div>
          </>
        )}
      </div>
    )}

    {/* Footer */}
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:16,paddingTop:13,borderTop:"1px solid rgba(139,101,32,.3)"}}>
      <button style={T.btn("")} onClick={()=>{if(confirm("Clear this character?"))setChars(p=>{const n=[...p];n[ai]=defChar();return n;});}}>Clear</button>
      <button style={T.btn("p")} onClick={()=>{try{localStorage.setItem("tl5e_"+ai,JSON.stringify(c));showToast("Character saved ✦");}catch(e){showToast("Save failed");}}}>✦ Save</button>
      <button style={T.btn("")} onClick={()=>{try{const raw=localStorage.getItem("tl5e_"+ai);if(raw){const d=JSON.parse(raw);setChars(p=>{const n=[...p];n[ai]={...defChar(),...d};return n;});showToast("Character loaded!");}else showToast("No saved data found.");}catch(e){showToast("Load failed");}}}>↑ Load</button>
    </div>
  </div>

  {/* ═══ MODALS ═══ */}
  {modal==="spells"&&(
    <Modal title="✨ Spell Database" items={SPELLS} fkey="school"
      onClose={()=>setModal(null)}
      onAdd={sp=>{if(c.spells.find(x=>x.name===sp.name)){showToast("Already in spell list");return;}upd("spells",[...c.spells,sp]);showToast(`${sp.name} added!`);}}
      Card={({item:sp,expanded,onAdd})=>(
        <>
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",fontWeight:600,color:ink,flex:1}}>{sp.name}</span>
            <span style={T.bdg(sp.level===0?"b":"gold")}>{sp.level===0?"Cantrip":["","1st","2nd","3rd","4th","5th","6th","7th","8th","9th"][sp.level]}</span>
            <span style={T.bdg("gold")}>{sp.school}</span>
            {sp.duration?.toLowerCase().includes("conc")&&<span style={T.bdg("r")}>Conc</span>}
            {sp.castTime?.toLowerCase().includes("bonus")&&<span style={T.bdg("g")}>Bonus</span>}
            {sp.castTime?.toLowerCase().includes("reaction")&&<span style={T.bdg("r")}>Reaction</span>}
          </div>
          <div style={{fontFamily:"'Crimson Text',serif",fontSize:".78rem",color:ink2,marginTop:3,display:"flex",gap:8,flexWrap:"wrap"}}>
            <span>{sp.castTime}</span><span>·</span><span>{sp.range}</span><span>·</span><span>{sp.duration}</span>{sp.saveAtk&&sp.saveAtk!=="—"&&<><span>·</span><span style={{color:red}}>{sp.saveAtk}</span></>}
          </div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:".44rem",color:goldd,marginTop:2}}>{(sp.classes||[]).join(", ")}</div>
          {expanded&&(
            <div style={{marginTop:7,paddingTop:7,borderTop:"1px solid rgba(139,101,32,.2)"}}>
              <div style={{fontSize:".83rem",color:ink2,lineHeight:1.55,marginBottom:8}}>{sp.desc}</div>
              <div style={{marginBottom:8,fontSize:".78rem"}}><strong>Components:</strong> {sp.components}</div>
              <button style={T.btn("p")} onClick={e=>{e.stopPropagation();onAdd();}}>＋ Add to Spell List</button>
            </div>
          )}
        </>
      )}
    />
  )}

  {modal==="weapons"&&(
    <Modal title="⚔ Weapon Database" items={WEAPONS} fkey="category"
      onClose={()=>setModal(null)}
      onAdd={w=>{upd("attacks",[...c.attacks,{name:w.name,toHit:fm(gm(c.str)+prof),damage:w.damage,dmgType:w.dmgType,notes:w.properties||""}]);showToast(`${w.name} added!`);}}
      Card={({item:w,expanded,onAdd})=>(
        <>
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",fontWeight:600,color:ink,flex:1}}>{w.name}</span>
            <span style={T.bdg("r")}>{w.dmgType}</span>
            <span style={T.bdg("gold")}>{w.category}</span>
            <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:".72rem",color:red}}>{w.damage}</span>
          </div>
          <div style={{fontFamily:"'Crimson Text',serif",fontSize:".78rem",color:ink2,marginTop:3}}>{w.properties} · {w.weight} lb · {w.cost}</div>
          {expanded&&(
            <div style={{marginTop:7,paddingTop:7,borderTop:"1px solid rgba(139,101,32,.2)"}}>
              {w.desc&&<div style={{fontSize:".83rem",color:ink2,marginBottom:8}}>{w.desc}</div>}
              <button style={T.btn("p")} onClick={e=>{e.stopPropagation();onAdd();}}>＋ Add to Attacks</button>
            </div>
          )}
        </>
      )}
    />
  )}

  {modal==="equipment"&&(
    <Modal title="🎒 Equipment Database" items={EQUIPMENT} fkey="category"
      onClose={()=>setModal(null)}
      onAdd={eq=>{upd("inventory",[...(c.inventory||[]),{name:eq.name,qty:1,weight:eq.weight||"",value:eq.cost||""}]);showToast(`${eq.name} added!`);}}
      Card={({item:eq,expanded,onAdd})=>(
        <>
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",fontWeight:600,color:ink,flex:1}}>{eq.name}</span>
            <span style={T.bdg("gold")}>{eq.category}</span>
            {eq.ac&&<span style={T.bdg("b")}>AC {eq.ac}</span>}
            <span style={{fontFamily:"'Crimson Text',serif",fontSize:".78rem",color:ink2}}>{eq.cost}</span>
          </div>
          <div style={{fontFamily:"'Crimson Text',serif",fontSize:".78rem",color:ink2,marginTop:2}}>{eq.weight} lb{eq.desc?` · ${eq.desc}`:""}</div>
          {expanded&&(
            <div style={{marginTop:7,paddingTop:7,borderTop:"1px solid rgba(139,101,32,.2)"}}>
              <button style={T.btn("p")} onClick={e=>{e.stopPropagation();onAdd();}}>＋ Add to Inventory</button>
            </div>
          )}
        </>
      )}
    />
  )}

  {modal==="potions"&&(
    <Modal title="⚗ Potions & Consumables" items={POTIONS} fkey="rarity"
      onClose={()=>setModal(null)}
      onAdd={p=>{upd("inventory",[...(c.inventory||[]),{name:p.name,qty:1,weight:p.weight||"",value:p.cost||""}]);showToast(`${p.name} added!`);}}
      Card={({item:p,expanded,onAdd})=>(
        <>
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",fontWeight:600,color:ink,flex:1}}>{p.name}</span>
            <span style={T.bdg(p.rarity==="Common"?"gold":p.rarity==="Uncommon"?"g":p.rarity==="Rare"?"b":p.rarity==="Very Rare"?"r":p.rarity==="Legendary"?"r":"gold")}>{p.rarity}</span>
            <span style={{fontFamily:"'Crimson Text',serif",fontSize:".78rem",color:ink2}}>{p.cost}</span>
          </div>
          <div style={{fontFamily:"'Crimson Text',serif",fontSize:".8rem",color:ink2,marginTop:2,fontStyle:"italic"}}>{p.effect}</div>
          {expanded&&(
            <div style={{marginTop:7,paddingTop:7,borderTop:"1px solid rgba(139,101,32,.2)"}}>
              {p.desc&&<div style={{fontSize:".83rem",color:ink2,marginBottom:8}}>{p.desc}</div>}
              <button style={T.btn("p")} onClick={e=>{e.stopPropagation();onAdd();}}>＋ Add to Inventory</button>
            </div>
          )}
        </>
      )}
    />
  )}

  <div style={T.tst(toast.s)}>{toast.m}</div>
</div>

);

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App />);
</script>
